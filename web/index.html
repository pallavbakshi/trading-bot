<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pattern Backtesting Viewer</title>
</head>
<body class="bg-bg text-text font-mono overflow-x-hidden">
  <div id="app" class="max-w-[1600px] mx-auto px-5 py-4">

    <h1 class="text-xl font-bold mb-2">Pattern Backtesting Viewer</h1>

    <!-- Ticker selector -->
    <div class="flex items-center gap-3 mb-1.5">
      <select id="ticker-select"
        class="bg-btn-bg border border-btn-border text-text font-mono text-base px-2 py-1 rounded cursor-pointer hover:border-accent"></select>
    </div>

    <!-- Toolbar: timeframe + zoom + snapshot -->
    <div class="flex items-center gap-3 mb-1.5">
      <div class="flex items-center gap-3 flex-1">
        <!-- Interval (D/W/M) -->
        <div class="flex gap-1" id="interval-buttons">
          <button class="interval-btn active bg-btn-bg border border-btn-border text-text-muted font-mono text-xs font-semibold px-2 py-0.5 rounded cursor-pointer hover:border-accent hover:text-accent" data-interval="daily">D</button>
          <button class="interval-btn bg-btn-bg border border-btn-border text-text-muted font-mono text-xs font-semibold px-2 py-0.5 rounded cursor-pointer hover:border-accent hover:text-accent" data-interval="weekly">W</button>
          <button class="interval-btn bg-btn-bg border border-btn-border text-text-muted font-mono text-xs font-semibold px-2 py-0.5 rounded cursor-pointer hover:border-accent hover:text-accent" data-interval="monthly">M</button>
        </div>
        <!-- Zoom -->
        <div class="flex items-center gap-1.5">
          <label class="text-text-muted text-xs whitespace-nowrap">Zoom</label>
          <input type="range" id="zoom-slider" min="0" max="100" value="0" class="w-[100px]" />
          <span id="zoom-label" class="text-text text-xs min-w-[36px] text-right">100%</span>
          <span class="text-text-dim text-xs whitespace-nowrap">&nbsp;&#8984;+/&#8984;-</span>
        </div>
      </div>
      <input type="date" id="goto-date" title="Go to date" class="bg-btn-bg border border-btn-border text-accent font-mono text-sm font-semibold px-2 py-0.5 rounded cursor-pointer hover:border-accent shrink-0" />
      <div class="shrink-0 flex gap-1.5">
        <button id="sim-btn" title="Simulate a trade from the current date"
          class="bg-btn-bg border border-btn-border text-text font-mono text-base px-2 py-1 rounded cursor-pointer hover:border-accent">&#128202; Trade Sim</button>
        <button id="keylevels-btn" title="Analyse S/R levels with LLM (cached per view)"
          class="bg-btn-bg border border-btn-border text-text font-mono text-base px-2 py-1 rounded cursor-pointer hover:border-accent">&#128205; Key Levels</button>
        <button id="snapshot-btn" title="Save PNG + CSV snapshot"
          class="bg-btn-bg border border-btn-border text-text font-mono text-base px-2 py-1 rounded cursor-pointer hover:border-accent">&#128247; Snapshot</button>
      </div>
    </div>

    <!-- Snapshot region: everything captured in PNG -->
    <div id="snapshot-region" class="bg-bg">
      <!-- OHLC bar + lookback/lookforward labels -->
      <div id="slider-labels" class="flex justify-between items-center mb-1">
        <span class="text-candle-up text-sm whitespace-nowrap">&larr; Lookback <span id="days-lookback"></span></span>
        <span id="now-ohlc" class="text-sm text-center flex items-center gap-2.5 flex-wrap justify-center"></span>
        <span class="text-candle-down text-sm whitespace-nowrap"><span id="days-lookforward"></span> Lookforward &rarr;</span>
      </div>

      <!-- Legend -->
      <div id="chart-legend" class="flex items-center gap-4 text-xs text-text-muted flex-wrap"></div>

      <!-- Chart row -->
      <div id="chart-row" class="flex items-stretch gap-1 mt-5">
        <button id="nav-left" class="bg-btn-bg border border-btn-border text-text-muted text-lg px-2 rounded-md cursor-pointer flex items-center select-none hover:border-accent hover:text-accent active:bg-btn-active active:text-white" title="Pan left (⌘[)">&#x276E;</button>
        <div id="chart-container" class="relative bg-chart-bg border border-border rounded-md overflow-visible flex-1 min-w-0">
          <div id="tooltip" class="absolute pointer-events-none bg-bg-panel border border-border rounded-md px-2.5 py-2 text-xs leading-relaxed hidden z-10 min-w-[180px]"></div>
          <div id="now-handle">
            <div class="now-label">NOW</div>
            <div class="now-thumb"></div>
            <div class="now-line"></div>
          </div>
          <div id="now-grab"></div>
        </div>
        <button id="nav-right" class="bg-btn-bg border border-btn-border text-text-muted text-lg px-2 rounded-md cursor-pointer flex items-center select-none hover:border-accent hover:text-accent active:bg-btn-active active:text-white" title="Pan right (⌘])">&#x276F;</button>
      </div>
    </div>

    <!-- Lookback / Lookforward buttons -->
    <div class="flex items-center justify-between mt-1.5 px-3">
      <div class="flex items-center gap-1" id="tf-buttons">
        <span class="text-text-muted text-xs mr-1">Lookback</span>
        <button class="tf-btn bg-btn-bg border border-btn-border text-text-muted font-mono text-xs font-semibold px-2 py-0.5 rounded cursor-pointer hover:border-accent hover:text-accent" data-days="63">3M</button>
        <button class="tf-btn bg-btn-bg border border-btn-border text-text-muted font-mono text-xs font-semibold px-2 py-0.5 rounded cursor-pointer hover:border-accent hover:text-accent" data-days="126">6M</button>
        <button class="tf-btn bg-btn-bg border border-btn-border text-text-muted font-mono text-xs font-semibold px-2 py-0.5 rounded cursor-pointer hover:border-accent hover:text-accent" data-days="189">9M</button>
        <button class="tf-btn bg-btn-bg border border-btn-border text-text-muted font-mono text-xs font-semibold px-2 py-0.5 rounded cursor-pointer hover:border-accent hover:text-accent" data-days="252">1Y</button>
        <button class="tf-btn bg-btn-bg border border-btn-border text-text-muted font-mono text-xs font-semibold px-2 py-0.5 rounded cursor-pointer hover:border-accent hover:text-accent" data-days="504">2Y</button>
      </div>
      <div class="flex items-center gap-1" id="vdr">
        <input type="date" id="vdr-start" title="Visible date range start" class="bg-btn-bg border border-btn-border text-text font-mono text-xs px-1.5 py-0.5 rounded cursor-pointer hover:border-accent" />
        <span class="text-text-dim text-xs">–</span>
        <input type="date" id="vdr-end" title="Visible date range end" class="bg-btn-bg border border-btn-border text-text font-mono text-xs px-1.5 py-0.5 rounded cursor-pointer hover:border-accent" />
      </div>
      <div class="flex items-center gap-1" id="lf-buttons">
        <span class="text-text-muted text-xs mr-1">Lookforward</span>
        <button class="lf-btn bg-btn-bg border border-btn-border text-text-muted font-mono text-xs font-semibold px-2 py-0.5 rounded cursor-pointer hover:border-accent hover:text-accent" data-days="63">3M</button>
        <button class="lf-btn bg-btn-bg border border-btn-border text-text-muted font-mono text-xs font-semibold px-2 py-0.5 rounded cursor-pointer hover:border-accent hover:text-accent" data-days="126">6M</button>
        <button class="lf-btn bg-btn-bg border border-btn-border text-text-muted font-mono text-xs font-semibold px-2 py-0.5 rounded cursor-pointer hover:border-accent hover:text-accent" data-days="189">9M</button>
        <button class="lf-btn bg-btn-bg border border-btn-border text-text-muted font-mono text-xs font-semibold px-2 py-0.5 rounded cursor-pointer hover:border-accent hover:text-accent" data-days="252">1Y</button>
        <button class="lf-btn bg-btn-bg border border-btn-border text-text-muted font-mono text-xs font-semibold px-2 py-0.5 rounded cursor-pointer hover:border-accent hover:text-accent" data-days="504">2Y</button>
      </div>
    </div>

    <!-- Navigate slider -->
    <div id="nav-row" class="flex items-center gap-2 mt-1.5 px-3 py-1.5 bg-bg-panel border border-border rounded-md">
      <label class="text-text-muted text-xs whitespace-nowrap">Navigate</label>
      <input type="range" id="nav-slider" min="0" max="1000" value="1000" class="flex-1" />
    </div>

    <!-- Toggles row -->
    <div class="flex items-center gap-6 mt-1.5 px-3 py-1 bg-bg-panel border border-border rounded-md flex-wrap">
      <div class="flex items-center gap-2">
        <label for="td-toggle" class="text-text-muted text-xs whitespace-nowrap cursor-pointer">Trading Days</label>
        <label class="relative inline-block w-9 h-5 cursor-pointer">
          <input type="checkbox" id="td-toggle" class="peer sr-only" />
          <span class="absolute inset-0 bg-border rounded-full transition-colors duration-200 peer-checked:bg-accent"></span>
          <span class="absolute left-0.5 top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform duration-200 peer-checked:translate-x-4"></span>
        </label>
      </div>
      <div class="flex items-center gap-2">
        <label for="vp-toggle" class="text-text-muted text-xs whitespace-nowrap cursor-pointer">Volume Profile</label>
        <label class="relative inline-block w-9 h-5 cursor-pointer">
          <input type="checkbox" id="vp-toggle" class="peer sr-only" />
          <span class="absolute inset-0 bg-border rounded-full transition-colors duration-200 peer-checked:bg-accent"></span>
          <span class="absolute left-0.5 top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform duration-200 peer-checked:translate-x-4"></span>
        </label>
      </div>
      <div class="flex items-center gap-2">
        <label for="sma-toggle" class="text-text-muted text-xs whitespace-nowrap cursor-pointer">SMA 50/200</label>
        <label class="relative inline-block w-9 h-5 cursor-pointer">
          <input type="checkbox" id="sma-toggle" class="peer sr-only" />
          <span class="absolute inset-0 bg-border rounded-full transition-colors duration-200 peer-checked:bg-accent"></span>
          <span class="absolute left-0.5 top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform duration-200 peer-checked:translate-x-4"></span>
        </label>
      </div>
      <div class="flex items-center gap-2">
        <label for="rsi-toggle" class="text-text-muted text-xs whitespace-nowrap cursor-pointer">RSI</label>
        <label class="relative inline-block w-9 h-5 cursor-pointer">
          <input type="checkbox" id="rsi-toggle" class="peer sr-only" />
          <span class="absolute inset-0 bg-border rounded-full transition-colors duration-200 peer-checked:bg-accent"></span>
          <span class="absolute left-0.5 top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform duration-200 peer-checked:translate-x-4"></span>
        </label>
      </div>
      <div class="flex items-center gap-2">
        <label for="avwap-toggle" class="text-text-muted text-xs whitespace-nowrap cursor-pointer">AVWAP</label>
        <label class="relative inline-block w-9 h-5 cursor-pointer">
          <input type="checkbox" id="avwap-toggle" class="peer sr-only" />
          <span class="absolute inset-0 bg-border rounded-full transition-colors duration-200 peer-checked:bg-accent"></span>
          <span class="absolute left-0.5 top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform duration-200 peer-checked:translate-x-4"></span>
        </label>
      </div>
    </div>

    <!-- Layer panel -->
    <div id="layer-header" class="mt-2 px-2.5 py-1 bg-bg border border-border border-b-0 rounded-t-md flex justify-between items-center text-sm font-semibold text-text-muted uppercase tracking-wide">
      <span>Signals</span>
    </div>
    <div id="layer-panel" class="bg-bg-panel border border-border border-t-0 rounded-b-md overflow-hidden text-sm grid grid-cols-2"></div>

    <!-- Backtesting History -->
    <div id="history-header"
      class="mt-2 px-2.5 py-1.5 bg-bg border border-border border-b-0 rounded-t-md flex justify-between items-center text-xs font-semibold text-text-muted uppercase tracking-wide cursor-pointer select-none">
      <span>Backtesting History</span>
      <div class="flex items-center gap-2">
        <button id="history-clear-btn"
          class="font-normal normal-case tracking-normal text-xs text-text-muted hover:text-red-500"
          title="Clear history for this ticker">Clear</button>
        <span id="history-chevron">▲</span>
      </div>
    </div>
    <div id="history-panel" class="bg-bg-panel border border-border border-t-0 rounded-b-md text-xs">
      <div id="history-empty" class="px-3 py-3 text-text-muted text-center">No trades recorded for this ticker.</div>
      <div id="history-list"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>

  <!-- Password gate — change PASSWORD below to share with friends -->
  <script>
    (function () {
      var PASSWORD = 'bilby';
      var KEY = 'tb_auth';
      if (localStorage.getItem(KEY) === '1') return;
      var gate = document.createElement('div');
      gate.id = 'auth-gate';
      gate.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#0d1117;display:flex;align-items:center;justify-content:center;font-family:monospace';
      gate.innerHTML = [
        '<div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:32px 40px;width:320px;text-align:center">',
          '<div style="font-size:1.1rem;font-weight:600;color:#e6edf3;margin-bottom:8px">Trading Viewer</div>',
          '<div style="font-size:0.8rem;color:#8b949e;margin-bottom:24px">Enter password to continue</div>',
          '<input id="auth-input" type="password" placeholder="Password" autocomplete="current-password"',
            ' style="width:100%;box-sizing:border-box;background:#0d1117;border:1px solid #30363d;color:#e6edf3;',
            'font-family:monospace;font-size:0.9rem;padding:8px 12px;border-radius:6px;margin-bottom:12px;outline:none">',
          '<button id="auth-btn"',
            ' style="width:100%;background:#238636;border:none;color:#fff;font-family:monospace;font-size:0.9rem;',
            'padding:8px;border-radius:6px;cursor:pointer">Enter</button>',
          '<div id="auth-err" style="color:#f85149;font-size:0.8rem;margin-top:10px;min-height:1em"></div>',
        '</div>'
      ].join('');
      document.body.appendChild(gate);
      function attempt() {
        var val = document.getElementById('auth-input').value;
        if (val === PASSWORD) {
          localStorage.setItem(KEY, '1');
          gate.remove();
        } else {
          document.getElementById('auth-err').textContent = 'Incorrect password';
          document.getElementById('auth-input').value = '';
          document.getElementById('auth-input').focus();
        }
      }
      document.getElementById('auth-btn').addEventListener('click', attempt);
      document.getElementById('auth-input').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') attempt();
      });
      setTimeout(function () { document.getElementById('auth-input').focus(); }, 50);
    })();
  </script>

<!-- Trade Simulator modal -->
<div id="sim-modal" style="display:none" class="fixed inset-0 z-50 flex items-center justify-center">
  <div id="sim-backdrop" class="absolute inset-0 bg-black/40"></div>
  <div class="relative bg-bg border border-border rounded-lg shadow-xl p-5 w-[500px] max-h-[90vh] overflow-y-auto z-10 font-mono">
    <div class="flex justify-between items-center mb-2">
      <h2 class="font-semibold text-base">Trade Simulator</h2>
      <button id="sim-close" class="text-text-muted hover:text-text text-xl leading-none px-1">&times;</button>
    </div>
    <div id="sim-ref" class="text-xs text-text-muted mb-4 pb-2 border-b border-border"></div>

    <!-- Entry type -->
    <div class="mb-3">
      <div class="text-xs font-semibold text-text-muted uppercase tracking-wide mb-1.5">Entry</div>
      <div class="flex gap-5 text-sm mb-2">
        <label class="flex items-center gap-1.5 cursor-pointer">
          <input type="radio" name="sim-entry-type" value="market" checked /> T+1 Open (market)
        </label>
        <label class="flex items-center gap-1.5 cursor-pointer">
          <input type="radio" name="sim-entry-type" value="limit" /> Limit price
        </label>
      </div>
      <div id="sim-limit-fields" style="display:none" class="flex gap-2">
        <input type="number" id="sim-entry-price" placeholder="Entry price" step="0.01"
          class="flex-1 bg-btn-bg border border-btn-border text-text font-mono text-sm px-2 py-1 rounded" />
        <input type="number" id="sim-max-entry-days" placeholder="Max days to enter" min="1" step="1"
          class="w-40 bg-btn-bg border border-btn-border text-text font-mono text-sm px-2 py-1 rounded" />
      </div>
    </div>

    <!-- TP / SL -->
    <div class="grid grid-cols-2 gap-2 mb-3">
      <div>
        <div class="text-xs text-text-muted mb-1">Take Profit <span class="text-text-dim">(optional)</span></div>
        <input type="number" id="sim-tp" placeholder="TP price" step="0.01"
          class="w-full bg-btn-bg border border-btn-border text-text font-mono text-sm px-2 py-1 rounded" />
      </div>
      <div>
        <div class="text-xs text-text-muted mb-1">Stop Loss <span class="text-text-dim">(optional)</span></div>
        <input type="number" id="sim-sl" placeholder="SL price" step="0.01"
          class="w-full bg-btn-bg border border-btn-border text-text font-mono text-sm px-2 py-1 rounded" />
      </div>
    </div>

    <!-- Max exit days -->
    <div class="mb-3">
      <div class="text-xs text-text-muted mb-1">Max days to hold from T+0 <span class="text-text-dim">(optional)</span></div>
      <input type="number" id="sim-max-exit-days" placeholder="e.g. 10" min="1" step="1"
        class="w-36 bg-btn-bg border border-btn-border text-text font-mono text-sm px-2 py-1 rounded" />
    </div>

    <!-- Direction (shown only when TP and SL are both empty) -->
    <div id="sim-direction-row" class="mb-3 hidden">
      <div class="text-xs font-semibold text-text-muted uppercase tracking-wide mb-1.5">Direction</div>
      <div class="flex gap-5 text-sm">
        <label class="flex items-center gap-1.5 cursor-pointer">
          <input type="radio" name="sim-dir" value="long" /> Long ▲
        </label>
        <label class="flex items-center gap-1.5 cursor-pointer">
          <input type="radio" name="sim-dir" value="short" /> Short ▼
        </label>
      </div>
    </div>

    <!-- Validation error -->
    <div id="sim-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded px-3 py-2 mb-3"></div>

    <button id="sim-run-btn"
      class="w-full bg-accent text-white font-mono text-sm px-4 py-1.5 rounded cursor-pointer hover:opacity-90 mb-3">
      Run Simulation
    </button>

    <!-- Results -->
    <div id="sim-results" class="hidden border-t border-border pt-3">
      <div class="text-xs font-semibold text-text-muted uppercase tracking-wide mb-2">Results</div>
      <div id="sim-results-content" class="text-sm space-y-1.5 mb-3"></div>
      <button id="sim-save-btn"
        class="w-full bg-btn-bg border border-btn-border text-text font-mono text-xs px-3 py-1.5 rounded cursor-pointer hover:border-accent">
        Save to History
      </button>
    </div>
  </div>
</div>
</body>
</html>
